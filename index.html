<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Family Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
html{height:100%;width:100%;overflow:hidden}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f7f8fa;color:#1a1a2e;height:100dvh;width:100dvw;overflow:hidden;display:grid;grid-template-rows:auto auto 1.3fr 2fr;grid-template-columns:1fr 1fr;gap:6px;padding:6px 6px 38px;transition:background 2s ease}
.top-bar{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:6px 18px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.clock{font-size:clamp(2rem,4.5vw,3rem);font-weight:700;letter-spacing:-1px;color:#1a1a2e}
.date-info{text-align:right}
.day-name{font-size:clamp(.9rem,2vw,1.3rem);font-weight:600;color:#4f46e5}
.full-date{font-size:clamp(.75rem,1.2vw,.95rem);color:#6b7280;margin-top:1px}
.card{background:#fff;border-radius:12px;padding:8px 12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.card-title{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#9ca3af;margin-bottom:6px}
.weather-main{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.weather-icon{font-size:clamp(1.6rem,3vw,2.2rem);line-height:1}
.weather-temp{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:700;color:#1a1a2e}
.weather-desc{font-size:clamp(.75rem,1.2vw,.95rem);color:#6b7280;text-transform:capitalize;margin-left:4px}
.weather-details{display:flex;gap:6px;font-size:.8rem;color:#6b7280;flex-wrap:wrap;margin-top:2px}
.weather-location{font-size:.72rem;color:#9ca3af;margin-top:2px}
.setup-box{background:#fef3c7;border-radius:10px;padding:10px 14px;font-size:.82rem;color:#92400e;line-height:1.6}
.setup-box code{background:#fde68a;padding:1px 5px;border-radius:4px}
.cal-setup-box{background:#f0fdf4;border-radius:10px;padding:12px 16px;font-size:.82rem;color:#166534;line-height:1.7}
.cal-setup-box ol{margin-left:18px;margin-top:6px}
.quote-card{justify-content:center}
.quote-text{font-size:clamp(.85rem,1.4vw,1.05rem);font-style:italic;line-height:1.45;color:#374151;word-wrap:break-word;overflow-wrap:break-word}
.quote-text::before{content:'\201C';font-size:2rem;color:#e0e7ff;line-height:0;vertical-align:-.5rem;margin-right:4px}
.quote-text::after{content:'\201D';font-size:2rem;color:#e0e7ff;line-height:0;vertical-align:-.5rem;margin-left:4px}
.quote-author{margin-top:4px;font-size:.85rem;font-weight:600;color:#4f46e5}
.calendar-card{grid-column:1/-1}
.events-list{display:flex;flex-direction:column;gap:8px}
.event-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:#f9fafb;border-left:4px solid #4f46e5}
.event-item.past{opacity:.4;border-left-color:#d1d5db}
.event-item.next{background:#eef2ff}
.event-time{font-size:.78rem;font-weight:600;color:#6b7280;min-width:70px}
.event-title{font-size:clamp(.82rem,1.6vw,.95rem);font-weight:500;color:#1a1a2e;flex:1}
.event-tag{font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:999px;background:#e0e7ff;color:#4338ca}
.no-events{font-size:1rem;color:#9ca3af;padding:10px 0}#cal{display:flex;flex-direction:column;flex:1}
.cal-columns{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex:1;align-content:start}
.cal-col{}
.cal-header-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px;flex-shrink:0}
.cal-col-header{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:6px 8px;border-radius:8px;margin-bottom:0;text-align:center}
.col-family{background:#ede9fe;color:#5b21b6}
.col-finn{background:#dbeafe;color:#1e40af}
.col-millie{background:#fdf2f8;color:#be185d}
.col-nolan{background:#fef9c3;color:#854d0e}
.events-list{display:flex;flex-direction:column;gap:6px}
.event-item{display:flex;flex-direction:column;gap:2px;padding:6px 10px;border-radius:8px;background:#f9fafb;border-left:3px solid #4f46e5}
.event-item.past{opacity:.4;border-left-color:#d1d5db}
.event-item.next{background:#eef2ff}
.event-time{font-size:.8rem;font-weight:600;color:#6b7280}
.event-title{font-size:.95rem;font-weight:500;color:#1a1a2e;line-height:1.3}
.event-tag{font-size:.85rem;font-weight:600;padding:2px 8px;border-radius:999px;background:#e0e7ff;color:#4338ca;align-self:flex-start;margin-top:2px}
#cfg-bar{position:fixed;bottom:0;left:0;right:0;background:#1e1b4b;color:#c7d2fe;font-size:.65rem;padding:3px 14px;display:flex;justify-content:space-between;align-items:center;z-index:100}
#cfg-bar button{background:#4f46e5;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:.75rem;cursor:pointer}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center}
#modal.open{display:flex}
.mbox{background:#fff;border-radius:20px;padding:28px;width:min(90vw,440px);box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mbox h2{font-size:1.1rem;font-weight:700;margin-bottom:18px;color:#1a1a2e}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;font-weight:600;color:#6b7280;margin-bottom:5px}
.field input{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:9px 12px;font-size:.88rem;outline:none;color:#1a1a2e}
.field input:focus{border-color:#4f46e5}
.field .hint{font-size:.72rem;color:#9ca3af;margin-top:4px}
.mactions{display:flex;gap:10px;margin-top:20px}
.mactions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:.88rem;font-weight:600;cursor:pointer}
.btn-save{background:#4f46e5;color:#fff}
.btn-cancel{background:#f3f4f6;color:#374151}
.sp{display:inline-block;width:18px;height:18px;border:2px solid #e0e7ff;border-top-color:#4f46e5;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.err{color:#ef4444;font-size:.85rem;line-height:1.5}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:baseline;gap:10px"><div class="clock" id="clock">00:00</div><div id="clock-ampm" style="font-size:clamp(1.2rem,3vw,2rem);font-weight:600;color:#4f46e5">AM</div></div>
  <div class="date-info">
    <div class="day-name" id="day-name">&mdash;</div>
    <div class="full-date" id="full-date">&mdash;</div>
  </div>
</div>

<div style="grid-column:1/-1;text-align:center;padding:1px 0;">
  <div style="font-size:clamp(.95rem,1.8vw,1.3rem);font-weight:700;color:#4f46e5;letter-spacing:0.5px;">Morrissey Family Daily Dashboard</div>
</div>

<div class="card">
  <div class="card-title">&#9728;&#65039; Weather</div>
  <div id="wx"><span class="sp"></span></div>
</div>

<div class="card quote-card">
  <div class="card-title">&#10024; Motivation of the Day</div>
  <div id="qt" class="quote-text"><span class="sp"></span></div>
  <div id="qa" class="quote-author"></div>
</div>

<div class="card calendar-card" style="display:flex;flex-direction:column;">
  <div class="card-title">&#128197; Today's Activities</div>
  <div id="cal"><span class="sp"></span></div>
</div>

<!-- Configure button is ALWAYS visible in the bottom bar -->
<div id="cfg-bar">
  <span id="cfg-hint">&#9881;&#65039; Settings</span>
  <button onclick="openM()">Configure</button>
</div>

<div id="modal">
  <div class="mbox">
    <h2>&#9881;&#65039; Dashboard Settings</h2>
    <div class="field">
      <label>OpenWeatherMap API Key</label>
      <input id="sk" type="text" placeholder="Paste your key here&hellip;"/>
      <div class="hint">Get a free key at openweathermap.org/api &mdash; note: new keys take ~15 min to activate</div>
    </div>
    <div class="field">
      <label>City (for weather)</label>
      <input id="sc" type="text" placeholder="e.g. McHenry,US"/>
    </div>
    <div style="font-size:.78rem;font-weight:600;color:#6b7280;margin-bottom:8px;">CALENDAR COLUMNS — paste .ics URL(s) per person, comma-separated for multiple</div>
    <div class="field">
      <label style="color:#5b21b6">&#9632; Family</label>
      <input id="si0" type="text" placeholder="webcal:// or https://..."/>
    </div>
    <div class="field">
      <label style="color:#1e40af">&#9632; Finn</label>
      <input id="si1" type="text" placeholder="webcal:// or https://..."/>
    </div>
    <div class="field">
      <label style="color:#9d174d">&#9632; Millie</label>
      <input id="si2" type="text" placeholder="webcal:// or https://..."/>
    </div>
    <div class="field">
      <label style="color:#065f46">&#9632; Nolan</label>
      <input id="si3" type="text" placeholder="webcal:// or https://..."/>
    </div>
    <div class="mactions">
      <button class="btn-cancel" onclick="closeM()">Cancel</button>
      <button class="btn-save" onclick="saveM()">Save &amp; Refresh</button>
    </div>
  </div>
</div>

<script>
const cfg = {
  get: k => localStorage.getItem(k) || '',
  set: (k,v) => localStorage.setItem(k,v)
};

function openM() {
  document.getElementById('sk').value = cfg.get('owm_key');
  document.getElementById('sc').value = cfg.get('owm_city');
  document.getElementById('si0').value = cfg.get('ics_0');
  document.getElementById('si1').value = cfg.get('ics_1');
  document.getElementById('si2').value = cfg.get('ics_2');
  document.getElementById('si3').value = cfg.get('ics_3');
  document.getElementById('modal').classList.add('open');
}
function closeM() { document.getElementById('modal').classList.remove('open'); }
function saveM() {
  cfg.set('owm_key',  document.getElementById('sk').value.trim());
  cfg.set('owm_city', document.getElementById('sc').value.trim());
  cfg.set('ics_0', document.getElementById('si0').value.trim());
  cfg.set('ics_1', document.getElementById('si1').value.trim());
  cfg.set('ics_2', document.getElementById('si2').value.trim());
  cfg.set('ics_3', document.getElementById('si3').value.trim());
  closeM();
  init();
}

function tick() {
  const n = new Date();
  const h = n.getHours(), m = String(n.getMinutes()).padStart(2,'0');
  const h12 = (h % 12) || 12, ampm = h < 12 ? 'AM' : 'PM';
  document.getElementById('clock').textContent = h12 + ':' + m;
  document.getElementById('clock-ampm').textContent = ampm;
  const D = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('day-name').textContent = D[n.getDay()];
  document.getElementById('full-date').textContent = M[n.getMonth()] + ' ' + n.getDate() + ', ' + n.getFullYear();
}
setInterval(tick, 1000); tick();

function setWeatherBg(condition, sunrise, sunset, now) {
  const isDay = now > sunrise && now < sunset;
  const themes = {
    Clear:        isDay ? 'linear-gradient(135deg,#fff9e6 0%,#fef3b0 100%)' : 'linear-gradient(135deg,#0f0c29 0%,#1a1a4e 100%)',
    Clouds:       isDay ? 'linear-gradient(135deg,#e8eaf0 0%,#d0d4de 100%)' : 'linear-gradient(135deg,#2c2c3e 0%,#3a3a52 100%)',
    Rain:         'linear-gradient(135deg,#c9d6df 0%,#9fb4c7 100%)',
    Drizzle:      'linear-gradient(135deg,#d4dfe6 0%,#aabfd0 100%)',
    Thunderstorm: 'linear-gradient(135deg,#3a3a4a 0%,#5a4a6a 100%)',
    Snow:         'linear-gradient(135deg,#eaf4fb 0%,#d6eaf8 100%)',
    Mist:         'linear-gradient(135deg,#dde1e7 0%,#c8cdd6 100%)',
    Fog:          'linear-gradient(135deg,#dde1e7 0%,#c8cdd6 100%)',
    Haze:         'linear-gradient(135deg,#e8e0d0 0%,#d4c9b0 100%)',
    Dust:         'linear-gradient(135deg,#e8d8b0 0%,#d4b896 100%)',
    Smoke:        'linear-gradient(135deg,#c8c0b8 0%,#b0a898 100%)',
  };
  const bg = themes[condition] || (isDay ? 'linear-gradient(135deg,#f7f8fa 0%,#eef0f4 100%)' : 'linear-gradient(135deg,#1a1a2e 0%,#2a2a3e 100%)');
  document.body.style.background = bg;
  // Adjust card opacity for night mode
  const isDark = !isDay && ['Clear','Clouds'].includes(condition);
  document.querySelectorAll('.card, .top-bar').forEach(el => {
    el.style.background = isDark ? 'rgba(255,255,255,0.08)' : '#ffffff';
    el.style.color = isDark ? '#e0e0f0' : '';
  });
  if (isDark) document.body.style.color = '#e0e0f0';
}

function buildDial(lo, hi, current) {
  const W = 155, H = 92, cx = W/2, cy = H - 5, r = 63;
  const toRad = d => d * Math.PI / 180;
  const clamp = (v,a,b) => Math.max(a,Math.min(b,v));

  // Color based on ABSOLUTE temperature feel
  function tempColor(t) {
    if (t <= 10)  return '#93c5fd'; // icy blue
    if (t <= 25)  return '#60a5fa'; // cold blue
    if (t <= 35)  return '#7dd3fc'; // light blue
    if (t <= 45)  return '#4ade80'; // cool green
    if (t <= 55)  return '#86efac'; // mild green
    if (t <= 65)  return '#fde047'; // pleasant yellow
    if (t <= 75)  return '#fb923c'; // warm orange
    if (t <= 85)  return '#f97316'; // hot orange
    return '#ef4444';               // very hot red
  }

  // Draw 60 arc segments across the half circle (180deg)
  const numSeg = 30;
  const segGap = 2.5; // degrees gap between segments
  let segments = '';
  for (let i = 0; i < numSeg; i++) {
    const t = i / numSeg; // 0=lo, 1=hi
    const actualTemp = lo + t * (hi - lo);
    const color = tempColor(actualTemp);
    const a1deg = 180 - t * 180;
    const a2deg = 180 - ((i + 1) / numSeg) * 180 + segGap;
    const a1 = toRad(a1deg), a2 = toRad(a2deg);
    const x1 = cx + r * Math.cos(a1), y1 = cy - r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy - r * Math.sin(a2);
    segments += '<path d="M'+x1+','+y1+' A'+r+','+r+' 0 0 1 '+x2+','+y2+'" stroke="'+color+'" stroke-width="38" fill="none" stroke-linecap="butt"/>';
  }

  // Inner white mask to make ring
  const ir = r - 40;
  const mask = '<path d="M'+(cx-r-2)+','+cy+' A'+(r+2)+','+(r+2)+' 0 0 1 '+(cx+r+2)+','+cy+' L'+(cx+ir)+','+cy+' A'+ir+','+ir+' 0 0 0 '+(cx-ir)+','+cy+' Z" fill="white"/>';
  // bottom fill
  const bottomMask = '<rect x="'+(cx-r-4)+'" y="'+(cy-2)+'" width="'+(2*r+8)+'" height="30" fill="white"/>';

  // Tick marks (major every 18deg = 10 ticks)
  let ticks = '';
  for (let i = 0; i <= 10; i++) {
    const a = toRad(180 - i * 18);
    const isMajor = i % 2 === 0;
    const ro = r + 2, ri2 = r + (isMajor ? 12 : 7);
    ticks += '<line x1="'+(cx+ro*Math.cos(a))+'" y1="'+(cy-ro*Math.sin(a))+'" x2="'+(cx+ri2*Math.cos(a))+'" y2="'+(cy-ri2*Math.sin(a))+'" stroke="#9ca3af" stroke-width="'+(isMajor?2:1.2)+'"/>';
  }

  // Needle - sharp triangle pointing to current temp
  const pct = (clamp(current, lo, hi) - lo) / Math.max(hi - lo, 1);
  const needleDeg = 180 - pct * 180;
  const needleRad = toRad(needleDeg);
  const needleLen = r - 4;
  const tipX = cx + needleLen * Math.cos(needleRad);
  const tipY = cy - needleLen * Math.sin(needleRad);
  const perpA1 = needleRad + Math.PI/2, perpA2 = needleRad - Math.PI/2;
  const bw = 7;
  const b1x = cx + bw*Math.cos(perpA1), b1y = cy - bw*Math.sin(perpA1);
  const b2x = cx + bw*Math.cos(perpA2), b2y = cy - bw*Math.sin(perpA2);
  // tail
  const tailX = cx - 14*Math.cos(needleRad), tailY = cy + 14*Math.sin(needleRad);
  const needle = '<polygon points="'+tipX+','+tipY+' '+b1x+','+b1y+' '+tailX+','+tailY+' '+b2x+','+b2y+'" fill="#1e293b" opacity="0.9"/>';
  const hubOuter = '<circle cx="'+cx+'" cy="'+cy+'" r="12" fill="#1e293b"/>';
  const hubInner = '<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="white"/>';

  // Lo/Hi labels at base of dial
  const loLbl = '<text x="'+(cx-r+2)+'" y="'+(cy+16)+'" font-size="12" fill="#6b7280" font-family="Inter,sans-serif" font-weight="700" text-anchor="middle">'+lo+'°</text>';
  const hiLbl = '<text x="'+(cx+r-2)+'" y="'+(cy+16)+'" font-size="12" fill="#6b7280" font-family="Inter,sans-serif" font-weight="700" text-anchor="middle">'+hi+'°</text>';
  const loWordLbl = '<text x="'+(cx-r+2)+'" y="'+(cy+28)+'" font-size="10" fill="#9ca3af" font-family="Inter,sans-serif" text-anchor="middle">Low</text>';
  const hiWordLbl = '<text x="'+(cx+r-2)+'" y="'+(cy+28)+'" font-size="10" fill="#9ca3af" font-family="Inter,sans-serif" text-anchor="middle">High</text>';

  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="overflow:visible;display:block">'+
    segments + mask + bottomMask + ticks + needle + hubOuter + hubInner +
    loLbl + hiLbl + loWordLbl + hiWordLbl +
    '</svg>';
}

const WI = {Thunderstorm:'&#9928;&#65039;',Drizzle:'&#127782;&#65039;',Rain:'&#127783;&#65039;',Snow:'&#10052;&#65039;',Clear:'&#9728;&#65039;',Clouds:'&#9729;&#65039;',Mist:'&#127787;&#65039;',Fog:'&#127787;&#65039;',Haze:'&#127787;&#65039;'};
async function loadWX() {
  const key = cfg.get('owm_key'), city = cfg.get('owm_city');
  const el = document.getElementById('wx');
  if (!key || !city) {
    el.innerHTML = '<div class="setup-box"><strong>Setup needed:</strong> tap <strong>Configure</strong> below to enter your OpenWeatherMap key and city.</div>';
    return;
  }
  try {
    const [r, rf] = await Promise.all([
      fetch('https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(city) + '&appid=' + key + '&units=imperial'),
      fetch('https://api.openweathermap.org/data/2.5/forecast?q=' + encodeURIComponent(city) + '&appid=' + key + '&units=imperial&cnt=10')
    ]);
    if (!r.ok) throw new Error('API error ' + r.status + (r.status===401 ? ' — check your key (new keys take ~15 min to activate)' : ''));
    const d = await r.json();
    setWeatherBg(d.weather[0].main, d.sys.sunrise, d.sys.sunset, d.dt);
    const ic = WI[d.weather[0].main] || '&#127777;';

    // Get high/low and precip chance from forecast
    let hi = d.main.temp_max, lo = d.main.temp_min, precipChance = 0, precipType = 'rain', precipTiming = '', hasSnow = false, totalRainIn = '0.00', totalSnowIn = '0.0';
    if (rf.ok) {
      const fd = await rf.json();
      const todayStr = new Date().toDateString();
      const todaySlots = fd.list.filter(s => new Date(s.dt * 1000).toDateString() === todayStr);
      if (todaySlots.length) {
        hi = Math.max(...todaySlots.map(s => s.main.temp_max));
        lo = Math.min(...todaySlots.map(s => s.main.temp_min));
        precipChance = Math.round(Math.max(...todaySlots.map(s => (s.pop || 0) * 100)));
        hasSnow = todaySlots.some(s => s.weather[0].main === 'Snow');
        precipType = hasSnow ? 'snow' : 'rain';

        // Sum up rain/snow amounts (API gives mm per 3hr slot, convert to inches)
        let totalRainMm = 0, totalSnowMm = 0;
        todaySlots.forEach(s => {
          if (s.rain && s.rain['3h']) totalRainMm += s.rain['3h'];
          if (s.snow && s.snow['3h']) totalSnowMm += s.snow['3h'];
        });
        totalRainIn = (totalRainMm / 25.4).toFixed(2);
        totalSnowIn = (totalSnowMm / 25.4).toFixed(1);

        // Find when precip is most likely
        if (precipChance >= 30) {
          const precipSlots = todaySlots.filter(s => (s.pop || 0) >= 0.3);
          if (precipSlots.length) {
            const hours = precipSlots.map(s => new Date(s.dt * 1000).getHours());
            const inMorning = hours.some(h => h >= 5 && h < 12);
            const inAfternoon = hours.some(h => h >= 12 && h < 17);
            const inEvening = hours.some(h => h >= 17 && h < 21);
            const inNight = hours.some(h => h >= 21 || h < 5);
            const windows = [];
            if (inMorning) windows.push('morning');
            if (inAfternoon) windows.push('afternoon');
            if (inEvening) windows.push('evening');
            if (inNight) windows.push('night');
            precipTiming = windows.length ? ' (' + windows.join(' & ') + ')' : '';
          }
        }
      }
    }

    // Dress tip for kids
    const temp = Math.round(d.main.temp);
    let dressTip = '';
    if (temp <= 20) dressTip = '🧥 Heavy coat, hat & gloves!';
    else if (temp <= 32) dressTip = '🧥 Heavy coat & gloves!';
    else if (temp <= 45) dressTip = '🧣 Warm coat & scarf!';
    else if (temp <= 55) dressTip = '🧥 Light jacket today!';
    else if (temp <= 65) dressTip = '👕 Light layer recommended!';
    else if (temp <= 75) dressTip = '👕 Comfortable outside!';
    else dressTip = '😎 T-shirt weather!';
    if (precipChance >= 40) dressTip += (precipType === 'snow' ? ' ❄️ Bring snow gear!' : ' ☂️ Bring a raincoat!');

    el.innerHTML =
      '<div class="weather-main"><span class="weather-icon">' + ic + '</span>' +
      '<div><span class="weather-temp">' + temp + '&deg;F</span>' +
      '<span class="weather-desc">' + d.weather[0].description + '</span></div></div>' +
      '<div style="display:flex;align-items:center;justify-content:space-between;flex:1;gap:8px;margin-top:6px">' +
      '<div style="display:flex;flex-direction:column;gap:10px;flex:1">' +
      '<div class="weather-details" style="flex-direction:column;gap:8px">' +
      '<span style="font-size:1.1rem">Feels ' + Math.round(d.main.feels_like) + '&deg;F</span>' +
      '<span style="font-size:1.1rem">&#127783; ' + precipChance + '% ' + precipType + precipTiming +
        (hasSnow && totalSnowIn > 0 ? ' &bull; ' + totalSnowIn + '&Prime; snow' :
         !hasSnow && totalRainIn > 0 ? ' &bull; ' + totalRainIn + '&Prime; rain' : '') +
        '</span>' +
      '<span style="font-size:1.1rem">&#128168; ' + Math.round(d.wind.speed) + ' mph</span>' +
      '</div>' +
      '<div style="padding:5px 10px;border-radius:8px;background:rgba(0,0,0,0.05);font-size:.85rem;font-weight:600;color:#374151;">' + dressTip + '</div>' +
      '</div>' +
      '<div style="flex-shrink:0">' + buildDial(Math.round(lo), Math.round(hi), Math.round(temp)) + '</div>' +
      '</div>' +

      '<div class="weather-location">&#128205; ' + d.name + '</div>';
  } catch(e) { el.innerHTML = '<div class="err">' + e.message + '</div>'; }
}

function parseICS(txt) {
  const evts = [];
  txt.split('BEGIN:VEVENT').slice(1).forEach(b => {
    const gv = k => { const m = b.match(new RegExp(k + '[^:]*:([^\\r\\n]+)')); return m ? m[1].trim() : ''; };
    const sm = gv('SUMMARY'), ds = gv('DTSTART'), de = gv('DTEND');
    if (!sm) return;
    const pd = v => {
      if (!v) return null;
      const c = v.replace(/[TZ]/g,'');
      if (c.length === 8) return new Date(c.slice(0,4), c.slice(4,6)-1, c.slice(6,8));
      return new Date(c.slice(0,4), c.slice(4,6)-1, c.slice(6,8), c.slice(8,10)||0, c.slice(10,12)||0);
    };
    evts.push({ sm, start: pd(ds), end: pd(de), allDay: ds.length === 8 });
  });
  return evts;
}
async function fetchICS(rawUrl) {
  const url = rawUrl.trim().replace(/^webcal:\/\//i, 'https://');

  const proxies = [
    // Direct fetch first
    u => u,
    // Most reliable proxies
    u => 'https://corsproxy.io/?' + encodeURIComponent(u),
    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    u => 'https://api.codetabs.com/v1/proxy?quest=' + u,
    u => 'https://thingproxy.freeboard.io/fetch/' + u,
    u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u),
  ];

  for (const makeUrl of proxies) {
    try {
      const r = await fetch(makeUrl(url), { signal: AbortSignal.timeout(8000) });
      if (!r.ok) continue;
      let t = await r.text();
      // allorigins /get returns JSON wrapper
      if (t.startsWith('{') && t.includes('contents')) {
        try { t = JSON.parse(t).contents; } catch {}
      }
      if (t && t.includes('BEGIN:VCALENDAR')) return t;
    } catch {}
  }
  return null;
}

async function loadColEvents(icsRaw) {
  if (!icsRaw) return [];
  const urls = icsRaw.split(',').map(s => s.trim()).filter(Boolean);
  const results = await Promise.all(urls.map(fetchICS));
  const allText = results.filter(Boolean).join('\n');
  if (!allText) return null;
  return parseICS(allText);
}

function renderCol(evts, colorClass) {
  if (evts === null) return '<div class="err" style="font-size:.75rem">Could not load</div>';
  const today = new Date().toDateString();
  const now = new Date();
  const te = (evts || []).filter(e => e.start && e.start.toDateString() === today).sort((a,b) => a.start - b.start);
  if (!te.length) return '<div class="no-events">No events</div>';
  const nx = te.find(e => !e.allDay && e.start >= now);
  return '<div class="events-list">' + te.map(ev => {
    const past = ev.end ? ev.end < now : ev.start < now;
    const next = ev === nx;
    let ts = 'All day';
    if (!ev.allDay && ev.start) {
      const h = ev.start.getHours(), mn = String(ev.start.getMinutes()).padStart(2,'0');
      ts = (h % 12 || 12) + ':' + mn + ' ' + (h < 12 ? 'AM' : 'PM');
    }
    return '<div class="event-item' + (past ? ' past' : '') + (next ? ' next' : '') + '">' +
      '<span class="event-time">' + ts + '</span>' +
      '<span class="event-title">' + ev.sm + '</span>' +
      (next ? '<span class="event-tag">Next</span>' : '') + '</div>';
  }).join('') + '</div>';
}

async function loadCal() {
  const el = document.getElementById('cal');
  const cols = [
    { key: 'ics_0', label: 'Family',  cls: 'col-family' },
    { key: 'ics_1', label: 'Finn',    cls: 'col-finn' },
    { key: 'ics_2', label: 'Millie',  cls: 'col-millie' },
    { key: 'ics_3', label: 'Nolan',   cls: 'col-nolan' },
  ];
  const anyConfigured = cols.some(c => cfg.get(c.key));
  if (!anyConfigured) {
    el.innerHTML = '<div class="cal-setup-box"><strong>Setup needed:</strong> tap <strong>Configure</strong> and assign calendar URLs to each family member.</div>';
    return;
  }
  el.innerHTML = '<span class="sp"></span>';
  try {
    const results = await Promise.all(cols.map(c => loadColEvents(cfg.get(c.key))));
    // Header row pinned to top, content fills remaining space
    const headerRow = '<div class="cal-header-row">' + cols.map(c =>
      '<div class="cal-col-header ' + c.cls + '">' + c.label + '</div>'
    ).join('') + '</div>';
    const contentRow = '<div class="cal-columns">' + cols.map((c, i) =>
      '<div class="cal-col">' + renderCol(results[i], c.cls) + '</div>'
    ).join('') + '</div>';
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    el.style.flex = '1';
    el.innerHTML = headerRow + contentRow;
  } catch(e) {
    el.innerHTML = '<div class="err">Could not load calendar: ' + e.message + '</div>';
  }
}
